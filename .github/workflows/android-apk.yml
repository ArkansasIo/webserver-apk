name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Bootstrap Gradle Wrapper
        run: gradle -p android-app wrapper --gradle-version 8.10.2

      - name: Build Debug APK
        run: ./android-app/gradlew -p android-app assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  build-signed-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check signing secrets
        id: signing_check
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_STORE_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bootstrap Gradle Wrapper
        if: ${{ steps.signing_check.outputs.enabled == 'true' }}
        run: gradle -p android-app wrapper --gradle-version 8.10.2

      - name: Prepare signing files
        if: ${{ steps.signing_check.outputs.enabled == 'true' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android-app/release-key.jks
          cat > android-app/keystore.properties <<EOF
          storeFile=release-key.jks
          storePassword=$ANDROID_STORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build Signed Release APK
        if: ${{ steps.signing_check.outputs.enabled == 'true' }}
        run: ./android-app/gradlew -p android-app assembleRelease

      - name: Upload Signed Release APK
        if: ${{ steps.signing_check.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android-app/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Skip notice
        if: ${{ steps.signing_check.outputs.enabled != 'true' }}
        run: echo "Signing secrets not configured; signed release build skipped."
